version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  bot:
    image: pushups-bot:latest
    restart: always
    user: "1000:1000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    tmpfs:
      - /tmp:size=64m
    volumes:
      - ./pushups.db:/app/pushups.db:rw,z
      - ./logs:/app/logs:rw,z
    environment:
      - REDIS_DSN=redis://redis:6379/0
      - HEALTH_HOST=0.0.0.0
      - HEALTH_PORT=8080
    security_opt:
      - no-new-privileges:true
      - apparmor=unconfined

volumes:
  redis_data:
